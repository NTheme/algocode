services:
  memcached:
    restart: always
    image: "memcached"
    container_name: "memcached"
    networks:
      - ejudge_net

  mongo:
    restart: always
    image: "mongo"
    container_name: "mongo"
    ports:
      - "127.0.0.1:27018:27017"
    networks:
      - ejudge_net

  algocode:
    build: 
      context: .
    restart: always
    image: "algocode:latest"
    container_name: "algocode"
    ports:
      - "127.0.0.1:8002:80"
    volumes:
      - ejudge_data:/home/judges:ro
    depends_on:
      - memcached
      - mongo
    networks:
      - ejudge_net

volumes:
  ejudge_data:
    name: ejudge_data

networks:
  ejudge_net:
    name: ejudge_net
