services:
  algocode:
    build: 
      context: .
    restart: always
    image: algocode:latest
    container_name: 'algocode'
    ports:
      - "127.0.0.1:8002:80"
    volumes:
      - algocode_data:/app
      - ejudge_ejudge_data:/home/judges:ro
    networks: 
      - ejudge-net

volumes:
  algocode_data:
    
  ejudge_ejudge_data:
    external: true

networks:
  ejudge-net:
    external: true
